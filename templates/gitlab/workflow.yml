---
# Pipeline Workflow Rules - Control when pipelines run
# Workflow Configuration - Define pipeline execution rules
#
# Controls when GitLab CI/CD pipelines are triggered. Implements the workflow:rules
# directive to prevent duplicate pipelines and control pipeline execution based on
# branch, merge request, and tag events.
#
# Quick Start:
#   Automatically included by base.yml
#   No additional configuration needed
#
# Pipeline Trigger Rules:
#   1. Always run on merge requests
#   2. Always run on default branch (main/master)
#   3. Always run on tags/releases
#   4. Always run on scheduled pipelines (weekly security scans)
#   5. Run on other branches only if DEVSECOPS_RUN_ON_BRANCHES="true"
#   6. Never run otherwise (prevents duplicate pipelines)
#
# Variables:
#   DEVSECOPS_RUN_ON_BRANCHES: "false"            # Enable pipelines on all branches (default: "false")
#
# Behavior:
#   Default (DEVSECOPS_RUN_ON_BRANCHES="false"):
#     - Merge requests: Pipeline runs
#     - Main/master branch: Pipeline runs
#     - Scheduled pipelines: Pipeline runs (security scans)
#     - Feature branches: No pipeline
#     - Tags: Pipeline runs
#
#   With DEVSECOPS_RUN_ON_BRANCHES="true":
#     - All branches: Pipeline runs
#     - Merge requests: Pipeline runs
#     - Scheduled pipelines: Pipeline runs
#     - Tags: Pipeline runs
#
# Scheduled Pipeline Support:
#   Scheduled pipelines are explicitly supported for periodic security scanning.
#   Configure in GitLab: Settings > CI/CD > Pipeline schedules
#   Security template jobs (dependency, SAST, container, etc.) run automatically
#   on schedules since their rules use feature toggles, not pipeline source filters.
#   Projects should exclude non-security jobs (build, deploy) from schedules.
#
# Prevents Duplicate Pipelines:
#   Without workflow rules, GitLab runs separate pipelines for:
#   - Branch push
#   - Merge request creation
#   This causes duplicates. Workflow rules ensure only one pipeline runs.
#
# Customization:
#   Override in your .gitlab-ci.yml:
#   workflow:
#     rules:
#       - if: '$CI_COMMIT_BRANCH =~ /^release/'  # Custom rule
#       - when: never
#
# See Also:
#   - https://docs.gitlab.com/ee/ci/yaml/workflow.html

workflow:
  rules:
    # Pipelines for merge requests always
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
      when: always
    # Pipelines for default branch always
    - if: '$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH'
      when: always
    # Scheduled pipelines always (weekly security scans, CVE detection)
    - if: '$CI_PIPELINE_SOURCE == "schedule"'
      when: always
    # Optional: tags/releases
    - if: '$CI_COMMIT_TAG'
      when: always
    # Otherwise only if explicitly enabled
    - if: '$DEVSECOPS_RUN_ON_BRANCHES == "true"'
      when: always
    - when: never
