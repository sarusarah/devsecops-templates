---
# OWASP SPVS: Develop Phase - Secure coding and continuous reviews
# Static Application Security Testing (SAST) - Source code security analysis
#
# Analyzes source code for security vulnerabilities, coding errors, and security anti-patterns
# without executing the code. Detects issues like SQL injection, XSS, hardcoded secrets,
# insecure configurations, and OWASP Top 10 vulnerabilities.
#
# Quick Start:
#   variables:
#     DEVSECOPS_ENABLE_SAST: "true"
#     DEVSECOPS_SAST_TOOL: "semgrep"  # or "trivy"
#
# Tool Options:
#   Semgrep (Recommended):
#     - Comprehensive security rules
#     - Language-specific patterns
#     - OWASP Top 10 coverage
#     - Best for JavaScript/TypeScript, Python, Java
#
#   Trivy:
#     - Misconfiguration detection
#     - Fast and lightweight
#     - Good for basic checks
#     - Better for infrastructure code
#
# Variables:
#   DEVSECOPS_ENABLE_SAST: "true"                 # Enable SAST scanning (default: "true")
#   DEVSECOPS_SAST_TOOL: "semgrep"                # Tool: "semgrep" or "trivy" (default: "semgrep")
#   DEVSECOPS_SECURITY_SCANNER: "specialized"     # Scanner mode (affects tool selection)
#   DEVSECOPS_PROJECT_PATH: ""                    # Monorepo: subproject path (e.g., "api")
#   DEVSECOPS_SECURITY_POLICY: "strict"           # Policy: "strict" or "permissive" (default: "strict")
#
# Supported Languages:
#   Semgrep: JavaScript/TypeScript, Python, Java, Go, Ruby, PHP, C/C++, C#, Kotlin, Rust
#   Trivy: YAML, JSON, Terraform, Dockerfile, Kubernetes
#
# Monorepo Support:
#   Scan specific application:
#   variables:
#     DEVSECOPS_PROJECT_PATH: "api"
#     DEVSECOPS_ENABLE_SAST: "true"
#     DEVSECOPS_SAST_TOOL: "semgrep"
#
# See Also:
#   - https://semgrep.dev/
#   - https://aquasecurity.github.io/trivy/

# Trivy-based SAST (basic misconfiguration and security checks)
sast:
  stage: source
  image:
    name: aquasec/trivy:0.58.1
    entrypoint: [""]
  before_script: []
  cache: {}
  script:
    - trivy --version
    - |
      trivy fs \
        --scanners misconfig \
        --severity HIGH,CRITICAL \
        --exit-code 0 \
        --format json \
        --output sast-report.json \
        "${DEVSECOPS_PROJECT_PATH:-.}"
  rules:
    - if: '$DEVSECOPS_ENABLE_SAST == "true" && ($DEVSECOPS_SECURITY_SCANNER == "trivy" || $DEVSECOPS_SAST_TOOL == "trivy")'
    - when: never
  allow_failure: false
  artifacts:
    when: always
    expire_in: 7 days
    paths:
      - sast-report.json
    reports:
      sast: sast-report.json

# Semgrep-based SAST (comprehensive security analysis)
sast-semgrep:
  stage: source
  image: returntocorp/semgrep:1.97.0
  before_script: []
  cache: {}
  script:
    - semgrep --version
    - semgrep scan --config p/security-audit --json -o semgrep.json "${DEVSECOPS_PROJECT_PATH:-.}"
  rules:
    - if: '$DEVSECOPS_ENABLE_SAST == "true" && ($DEVSECOPS_SECURITY_SCANNER == "specialized" || $DEVSECOPS_SAST_TOOL == "semgrep")'
    - when: never
  allow_failure: false
  artifacts:
    when: always
    expire_in: 7 days
    paths:
      - semgrep.json
    reports:
      sast: semgrep.json
