---
# Monorepo Example - GitLab CI Configuration
# This demonstrates how to use DevSecOps templates with monorepo support

include:
  # Include DevSecOps templates
  - project: components/dev-sec-ops
    ref: main  # Use specific version tag in production (e.g., v1.0.2)
    file:
      - /templates/gitlab/base.yml
      - /templates/gitlab/build.yml
      - /templates/gitlab/test.yml
      - /templates/gitlab/security/secrets.yml
      - /templates/gitlab/security/sast.yml
      - /templates/gitlab/security/dependency.yml
      - /templates/gitlab/security/dtrack.yml

# Global variables (optional)
variables:
  DEVSECOPS_SECURITY_SCANNER: "trivy"  # Use trivy for unified scanning

  # Dependency-Track SBOM upload (optional)
  # Uncomment and configure to enable
  # DEVSECOPS_ENABLE_DTRACK: "true"
  # DEVSECOPS_DTRACK_URL: "https://api.dtrack.example.com"
  # DEVSECOPS_DTRACK_API_KEY: "${DEVSECOPS_DTRACK_API_KEY}"  # Set as CI/CD secret variable

# ============================================================================
# Frontend Jobs - Only run when frontend/ changes
# ============================================================================

secrets-detection:frontend:
  extends: secrets-detection
  variables:
    DEVSECOPS_PROJECT_PATH: frontend
  rules:
    - changes:
        - frontend/**/*
      if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    - if: '$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH'
      changes:
        - frontend/**/*

build:frontend:
  extends: .build:node
  variables:
    DEVSECOPS_PROJECT_PATH: frontend
    NODE_VERSION: "20"
    PACKAGE_MANAGER: "npm"
  rules:
    - changes:
        - frontend/**/*

test:frontend:
  extends: .test:node
  variables:
    DEVSECOPS_PROJECT_PATH: frontend
  rules:
    - changes:
        - frontend/**/*
  needs:
    - build:frontend

sast:frontend:
  extends: sast
  variables:
    DEVSECOPS_PROJECT_PATH: frontend
  rules:
    - changes:
        - frontend/**/*

dependency-scan:frontend:
  extends: dependency-scanning
  variables:
    DEVSECOPS_PROJECT_PATH: frontend
  rules:
    - changes:
        - frontend/**/*

dtrack-upload:frontend:
  extends: dtrack-upload
  variables:
    DEVSECOPS_PROJECT_PATH: frontend
    DEVSECOPS_ENABLE_DTRACK: "true"
  rules:
    - if: '$DEVSECOPS_ENABLE_DTRACK == "true"'
      changes:
        - frontend/**/*

# ============================================================================
# Backend Jobs - Only run when backend/ changes
# ============================================================================

secrets-detection:backend:
  extends: secrets-detection
  variables:
    DEVSECOPS_PROJECT_PATH: backend
  rules:
    - changes:
        - backend/**/*
      if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    - if: '$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH'
      changes:
        - backend/**/*

build:backend:
  extends: .build:python
  variables:
    DEVSECOPS_PROJECT_PATH: backend
    PYTHON_VERSION: "3.12"
  rules:
    - changes:
        - backend/**/*

test:backend:
  extends: .test:python
  variables:
    DEVSECOPS_PROJECT_PATH: backend
  rules:
    - changes:
        - backend/**/*
  needs:
    - build:backend

sast:backend:
  extends: sast
  variables:
    DEVSECOPS_PROJECT_PATH: backend
  rules:
    - changes:
        - backend/**/*

dependency-scan:backend:
  extends: dependency-scanning
  variables:
    DEVSECOPS_PROJECT_PATH: backend
  rules:
    - changes:
        - backend/**/*

dtrack-upload:backend:
  extends: dtrack-upload
  variables:
    DEVSECOPS_PROJECT_PATH: backend
    DEVSECOPS_ENABLE_DTRACK: "true"
  rules:
    - if: '$DEVSECOPS_ENABLE_DTRACK == "true"'
      changes:
        - backend/**/*

# ============================================================================
# Root-level scans - Always run (scan entire repository)
# ============================================================================

secrets-detection:root:
  extends: secrets-detection
  variables:
    DEVSECOPS_PROJECT_PATH: "."
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    - if: '$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH'
