---
# =============================================================================
# Node.js / Nuxt Application — DevSecOps Pipeline
# =============================================================================
#
# What this demonstrates:
#   Full CI/CD pipeline for a Node.js (Nuxt) app with specialized security
#   scanning, DAST against staging, GitOps deployment, and optional AI reports.
#
# Prerequisites:
#   - Node.js project with pnpm lockfile (pnpm-lock.yaml)
#   - GitOps repository for deployments
#
# Required CI/CD secrets:
#   - GITOPS_SSH_KEY          — SSH key for pushing to GitOps repo
#   - DEVSECOPS_DTRACK_API_KEY          — (optional) Dependency-Track API key
#   - AI_API_KEY              — (optional) Gemini or OpenAI API key
#   - DEVSECOPS_SLACK_WEBHOOK_URL       — (optional) Slack incoming webhook URL
#
# =============================================================================

include:
  - project: components/dev-sec-ops
    ref: v1.0.2
    file:
      - /templates/gitlab/base.yml
      - /templates/gitlab/security/secrets.yml
      - /templates/gitlab/security/dependency.yml
      - /templates/gitlab/security/sast.yml
      - /templates/gitlab/security/dtrack.yml
      - /templates/gitlab/deploy-staging.yml
      - /templates/gitlab/deploy-production.yml
      - /templates/gitlab/monitor.yml
      - /templates/gitlab/ai-report.yml           # Optional: AI pipeline analysis + Slack
      # - /templates/gitlab/security/container.yml # Optional: container image scanning
      # - /templates/gitlab/security/iac.yml       # Optional: IaC scanning (Terraform, K8s)
      # - /templates/gitlab/security/dast.yml      # Optional: OWASP ZAP DAST

# ---------------------------------------------------------------------------
# Variables — tune scanning, deployment, and optional integrations
# ---------------------------------------------------------------------------
variables:
  APP_NAME: "nuxt-app"
  LANGUAGE: "node"
  NODE_VERSION: "20"
  PACKAGE_MANAGER: "pnpm"          # npm|yarn|pnpm

  # --- Security scanner selection -----------------------------------------
  # Use specialized tools for comprehensive JavaScript/TypeScript analysis
  DEVSECOPS_SECURITY_SCANNER: "specialized"
  DEVSECOPS_SAST_TOOL: "semgrep"             # Semgrep has excellent JS/TS rules

  # --- Security policy & error handling ------------------------------------
  # DEVSECOPS_SECURITY_POLICY: "permissive"  # Start permissive, switch to "strict" once triaged
  # DEVSECOPS_TRIVY_EXIT_CODE: "0"           # "0" = warn only, "1" = fail pipeline on findings
  # DEVSECOPS_TRIVY_SEVERITY: "CRITICAL,HIGH" # Severity levels to report
  # DEVSECOPS_TRIVY_IGNORE_UNFIXED: "true"   # Ignore vulnerabilities without a fix

  # --- DAST ---------------------------------------------------------------
  DEVSECOPS_ENABLE_DAST: "true"
  DEVSECOPS_STAGING_URL: "https://staging.example.com"

  # --- GitOps deployment --------------------------------------------------
  GITOPS_REPO: "git@gitlab.example.com:gitops/nuxt-app.git"
  # GITOPS_PATH: "values.yaml"
  # GITOPS_IMAGE_TAG_YQ_PATH: ".image.tag"

  # --- Container scanning (optional) --------------------------------------
  # DEVSECOPS_ENABLE_CONTAINER_SCAN: "true"
  # DEVSECOPS_IMAGE_NAME: "${CI_REGISTRY_IMAGE}"
  # DEVSECOPS_IMAGE_TAG: "${CI_COMMIT_SHORT_SHA}"

  # --- Dependency-Track SBOM upload (optional) ----------------------------
  DEVSECOPS_ENABLE_DTRACK: "false"           # Set to "true" and configure below to enable
  # DEVSECOPS_DTRACK_URL: "https://api.dtrack.example.com"
  # DEVSECOPS_DTRACK_API_KEY: "${DEVSECOPS_DTRACK_API_KEY}"  # CI/CD secret

  # --- AI-powered pipeline analysis (optional) ----------------------------
  DEVSECOPS_ENABLE_AI_REPORT: "false"        # Set to "true" and configure below to enable
  # AI_PROVIDER: "gemini"          # or "openai" (default: "gemini")
  # AI_API_KEY: set as CI/CD secret (Gemini or OpenAI API key)
  # DEVSECOPS_SLACK_WEBHOOK_URL: set as CI/CD secret (Slack incoming webhook)

# ---------------------------------------------------------------------------
# Custom jobs
# ---------------------------------------------------------------------------

build-application:
  stage: build
  image: node:${NODE_VERSION}-alpine
  script:
    - corepack enable
    - pnpm install --frozen-lockfile
    - pnpm build
  artifacts:
    paths:
      - .output/
      - .nuxt/
      - node_modules/

unit-tests:
  stage: test
  image: node:${NODE_VERSION}-alpine
  script:
    - corepack enable
    - pnpm install --frozen-lockfile
    - pnpm test -- --ci
  artifacts:
    when: always
    reports:
      junit: junit.xml
    paths:
      - junit.xml

# Optional: E2E tests against staging
e2e-tests:
  stage: test
  image: cypress/included:15.3.0
  script:
    - cypress run --config baseUrl=${DEVSECOPS_STAGING_URL}
  rules:
    - if: $DEVSECOPS_ENABLE_E2E == "true"

# Tip: use a local devsecops.yml wrapper to pin the template version once.
# See "Local Include Pattern" in the README for a step-by-step guide.
